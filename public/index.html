<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello!</title>
  </head>
  <body>
    <h1>📄 Multi-Format Document Text Extractor</h1>
    <p>Upload any document to extract text. Supports: PDF, DOCX, DOC, PPT, PPTX, TXT</p>
    
    <div style="margin: 20px 0;">
      <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.ppt,.pptx,.txt" />
      <button type="button" id="btnUpload">Extract Text</button>
      <button type="button" id="btnClear" style="margin-left: 10px;">Clear</button>
    </div>
    
    <div id="fileInfo" style="color: #666; margin: 10px 0;"></div>
    
    <textarea
      id="resultText"
      placeholder="Your extracted text will appear here..."
      style="width: 90%; height: 400px; font-family: monospace;"
    ></textarea>
    
    <div id="metadata" style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px; display: none;">
      <h3>Document Metadata</h3>
      <pre id="metadataContent" style="white-space: pre-wrap;"></pre>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const btnUpload = document.getElementById("btnUpload");
      const btnClear = document.getElementById("btnClear");
      const resultText = document.getElementById("resultText");
      const fileInfo = document.getElementById("fileInfo");
      const metadataDiv = document.getElementById("metadata");
      const metadataContent = document.getElementById("metadataContent");

      // File info display
      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (file) {
          const fileSize = (file.size / 1024).toFixed(2);
          const fileType = file.name.split('.').pop().toUpperCase();
          fileInfo.textContent = `Selected: ${file.name} (${fileType}, ${fileSize} KB)`;
        } else {
          fileInfo.textContent = "";
        }
      });

      // Extract text handler
      btnUpload.addEventListener("click", () => {
        const file = fileInput.files[0];
        if (!file) {
          alert("Please select a file first!");
          return;
        }

        const formData = new FormData();
        formData.append("document", file);

        resultText.value = "Processing...";
        metadataDiv.style.display = "none";

        // Use the /extract-document endpoint to get metadata too
        fetch("/extract-document", {
          method: "POST",
          body: formData,
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error("Failed to process document");
            }
            return response.json();
          })
          .then(data => {
            resultText.value = data.text;
            
            // Show metadata if available
            if (data.metadata) {
              metadataContent.textContent = JSON.stringify(data.metadata, null, 2);
              metadataDiv.style.display = "block";
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            resultText.value = "";
            alert("Failed to process the document. Make sure it's a valid file format.");
          });
      });

      // Clear button handler
      btnClear.addEventListener("click", () => {
        fileInput.value = "";
        resultText.value = "";
        fileInfo.textContent = "";
        metadataDiv.style.display = "none";
      });
    </script>
  </body>
</html>
