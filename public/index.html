<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello!</title>
  </head>
  <body>
    <h1>Document Text Extractor</h1>
    
    <h2>PDF Extractor</h2>
    <input type="file" id="pdfInput" accept=".pdf" />
    <button type="button" id="btnUploadPdf">Upload PDF</button>
    <br />
    <textarea
      id="pdfResultText"
      placeholder="Your PDF text will appear here!"
      style="width: 500px; height: 200px"
    ></textarea>
    
    <br />
    <br />
    
    <h2>DOCX Extractor</h2>
    <input type="file" id="docxInput" accept=".docx" />
    <button type="button" id="btnUploadDocx">Upload DOCX</button>
    <br />
    <textarea
      id="docxResultText"
      placeholder="Your DOCX text will appear here!"
      style="width: 500px; height: 200px"
    ></textarea>

    <script>
      // PDF Upload Handler
      const pdfInput = document.getElementById("pdfInput");
      const btnUploadPdf = document.getElementById("btnUploadPdf");
      const pdfResultText = document.getElementById("pdfResultText");

      btnUploadPdf.addEventListener("click", () => {
        const file = pdfInput.files[0];
        if (!file) {
          alert("Please select a PDF file first!");
          return;
        }

        const formData = new FormData();
        formData.append("pdfFile", file);

        pdfResultText.value = "Processing...";

        fetch("/extract-pdf", {
          method: "POST",
          body: formData,
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error("Failed to process PDF");
            }
            return response.text();
          })
          .then(data => {
            pdfResultText.value = data;
          })
          .catch((error) => {
            console.error("Error:", error);
            pdfResultText.value = "";
            alert("Failed to upload and parse the PDF.");
          });
      });

      // DOCX Upload Handler
      const docxInput = document.getElementById("docxInput");
      const btnUploadDocx = document.getElementById("btnUploadDocx");
      const docxResultText = document.getElementById("docxResultText");

      btnUploadDocx.addEventListener("click", () => {
        const file = docxInput.files[0];
        if (!file) {
          alert("Please select a DOCX file first!");
          return;
        }

        const formData = new FormData();
        formData.append("docxFile", file);

        docxResultText.value = "Processing...";

        fetch("/extract-docx", {
          method: "POST",
          body: formData,
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error("Failed to process DOCX");
            }
            return response.text();
          })
          .then(data => {
            docxResultText.value = data;
          })
          .catch((error) => {
            console.error("Error:", error);
            docxResultText.value = "";
            alert("Failed to upload and parse the DOCX.");
          });
      });
    </script>
  </body>
</html>
